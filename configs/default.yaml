# Config de referência (carregue com yaml.safe_load e passe p/ TrainConfig).
# Perfil calibrado para a GPU T4 do Colab (16 GB). Comece pelo caminho
# pré-computado (precompute_slices) para treino rápido.

# --- dados ---
root: "/content/BraTS2020"        # ajuste no Colab (ou use shards pré-computados)
img_size: 256
batch_size: 4                     # T4 suporta ~4 com SAM2+LoRA; 16+ com o stub
slices_per_case: 32

# --- backbone / modelo ---
backbone: "sam2"                  # "sam2" | "stub" | (ablação: "unet")
sam2_cfg: "sam2_hiera_t.yaml"
sam2_ckpt: "checkpoints/sam2_hiera_tiny.pt"
freeze_encoder: true
n_seg_classes: 4                  # fundo, NCR/NET, ED, ET
n_grades: 2                       # LGG vs HGG
feat_ch: 256
p_drop: 0.1                       # dropout (habilita MC-Dropout p/ incerteza)

# --- LoRA (adaptação eficiente do encoder de fundação) ---
use_lora: true
lora_r: 4                         # rank baixo p/ T4
lora_alpha: 16
lora_dropout: 0.05

# --- perdas ---
w_seg: 1.0
w_grade: 0.5
use_focal: false
region: "tversky"                 # "dice" | "tversky" (tversky prioriza recall em ET)
tversky_alpha: 0.3                # peso dos falsos-positivos
tversky_beta: 0.7                 # peso dos falsos-negativos (>alpha = mais recall)
tversky_gamma: 1.0                # >1 = foco nas sub-regiões difíceis (focal-tversky)
grade_label_smoothing: 0.05       # regulariza a graduação -> melhor calibração/ECE
seg_ce_weight: [0.1, 1.0, 1.0, 1.0]   # deprioriza o fundo
auto_grade_weight: true           # peso inverso-freq na CE de grau (corrige o viés HGG)

# --- otimização ---
epochs: 40
lr: 0.0003
weight_decay: 0.0001
warmup_epochs: 3                  # warmup linear antes do cosine
min_lr_ratio: 0.02
grad_clip: 1.0
accum_steps: 2                    # batch efetivo = batch_size * accum_steps
amp: true                         # mixed precision (essencial na T4)
early_stop_patience: 10           # 0 desativa

# --- data loading ---
augment: true                     # flips/rot90/intensidade/gamma no treino
balance_grade: false              # resampling do loader; use OU isto OU auto_grade_weight

# --- infra ---
out_dir: "runs/exp1"
